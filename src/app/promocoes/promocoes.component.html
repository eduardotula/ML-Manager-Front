<div class="container-container-fluid limit-content card mx-auto">
  <div class="table-wrapper">
    <table #tables mat-table [dataSource]="dataSource" class="table align-middle w-100 " matSort>


      <!-- IMAGEM -->
      <ng-container matColumnDef="imagem">
        <th mat-header-cell *matHeaderCellDef></th>

        <td mat-cell *matCellDef="let promocao" class="col-imagem">
          <img [src]="promocao.anuncio.thumbnailUrl" alt="Produto" class="produto-img" />
        </td>
      </ng-container>

      <ng-container matColumnDef="descricao">
        <th mat-header-cell *matHeaderCellDef>Produto</th>
        <td mat-cell *matCellDef="let promocao">
          <div class="produto-container">
            <div class="produto-nome">
              {{ promocao.anuncio.descricao }}
            </div>
          </div>
        </td>
      </ng-container>

      <!-- INFORMAÇÕES -->
      <ng-container matColumnDef="informacoes">
        <th mat-header-cell *matHeaderCellDef></th>

        <td mat-cell *matCellDef="let promocao">
          <mat-accordion>
            <mat-expansion-panel [expanded]="true">
              <mat-expansion-panel-header>
                <mat-panel-title>Promoções</mat-panel-title>
              </mat-expansion-panel-header>
              <div *ngIf="promocao.promocoes.length === 0" class="info-row">
                <span class="info-label text-muted">Nenhuma promoção</span>
              </div>
              <form [formGroup]="promocoesForm">


              <mat-radio-group aria-label="Promoções">
                <div *ngFor="let item of promocao.promocoes">
                  <ng-container *ngIf="item.name.length > 0">
                    <div class="info-row">
                      <mat-radio-button color="warn" [value]="item.id" class="me-2"></mat-radio-button>
                      <span class="info-label">{{ item.name }}</span>
                      <span class="info-value">Preço: R$ {{ item.suggestedDiscountedPrice | number: '1.2-2' }}</span>
                      <div class="info-value">
                        <div class="row">Desconto</div>
                        <div class="row" style="font-size: smaller;">Min: R${{ item.minDiscountedPrice | number: '1.2-2' }}</div>
                        <div class="row" style="font-size: smaller;">Max: R$ {{ item.maxDiscountedPrice | number: '1.2-2' }}</div>
                      </div>
                      <div class="form-group">
                        <input class="form-control" type="number"  />
                      </div>
                    </div>
                  </ng-container>
                </div>
              </mat-radio-group>
              </form>

            </mat-expansion-panel>
          </mat-accordion>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  <mat-paginator [pageSizeOptions]="pageSizeOptions" showFirstLastButtons [length]="totalElements" [pageSize]="pageSize"
    [pageIndex]="pageIndex" (page)="onPageChange($event)" class="mt-3 sticky-paginator"></mat-paginator>
</div>
